[package]
name = "deriva-compute"
version = "0.1.0"
edition = "2021"

[features]
default = ["extended-streaming"]
extended-streaming = []

[dependencies]
deriva-core = { path = "../deriva-core" }
bytes = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
num_cpus = "1"
blake3 = "1"
data-encoding = "2"
zstd = "0.13"
lz4_flex = "0.11"
snap = "1"
brotli = "7"
md-5 = "0.10"
hmac = "0.12"
aes = "0.8"
ctr = "0.9"
aes-gcm = "0.10"
regex = "1"
rand = "0.8"
encoding_rs = "0.8"
serde_json = "1"
jsonschema = "0.28"
csv = "1"
serde_yaml = "0.9"
toml = "0.8"
sha2 = { workspace = true }
base64 = { workspace = true }
flate2 = { workspace = true }
crc32fast = { workspace = true }
prometheus = { workspace = true }

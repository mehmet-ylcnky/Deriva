[package]
name = "deriva-compute"
version = "0.1.0"
edition = "2021"

[features]
default = ["extended-streaming"]
extended-streaming = []

[dependencies]
parquet = { version = "57", features = ["arrow"] }
arrow = { version = "57", features = ["ipc", "json"] }
orc-rust = "0.7"
image = { version = "0.25", features = ["png", "jpeg", "gif", "webp", "tiff", "bmp"] }
resvg = "0.47"
deriva-core = { path = "../deriva-core" }
bytes = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
num_cpus = "1"
blake3 = "1"
data-encoding = "2"
zstd = "0.13"
lz4_flex = "0.11"
snap = "1"
brotli = "7"
md-5 = "0.10"
hmac = "0.12"
aes = "0.8"
ctr = "0.9"
aes-gcm = "0.10"
regex = "1"
rand = "0.8"
encoding_rs = "0.8"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
jsonschema = "0.28"
csv = "1"
serde_yaml = "0.9"
configparser = "3"
hcl-rs = "0.19"
toml = "0.8"
quick-xml = { version = "0.36", features = ["serialize"] }
jsonpath-rust = "0.7"
sha2 = { workspace = true }
base64 = { workspace = true }
flate2 = { workspace = true }
tar = "0.4"
zip = { version = "2", default-features = false, features = ["deflate"] }
bzip2 = "0.5"
xz2 = "0.1"
sevenz-rust = "0.6"
crc32fast = { workspace = true }
libipld = "0.16"
reed-solomon-erasure = "6"
apache-avro = "0.21"
rmp-serde = "1"
ciborium = "0.2"
bson = { version = "3", features = ["serde_json-1", "serde"] }
prost = "0.14"
prost-reflect = { version = "0.16", features = ["serde"] }
prost-types = "0.14"
prometheus = { workspace = true }
lazy_static = { workspace = true }

[dev-dependencies]
sled = { workspace = true }

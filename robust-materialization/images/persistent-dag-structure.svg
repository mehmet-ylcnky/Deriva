<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64b5f6"/></marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ffb74d"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#1a1e2e"/>

  <!-- PersistentDag box -->
  <rect x="250" y="20" width="400" height="110" rx="8" fill="#232840" stroke="#64b5f6" stroke-width="2"/>
  <text x="450" y="50" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">PersistentDag</text>
  <line x1="260" y1="62" x2="640" y2="62" stroke="#3a3f5c" stroke-width="1"/>
  <text x="270" y="84" fill="#81d4fa" font-size="14" font-family="'Consolas', monospace">forward: Tree</text>
  <text x="470" y="84" fill="#666" font-size="12" font-family="'Consolas', monospace">// CAddr → Vec&lt;CAddr&gt; (inputs)</text>
  <text x="270" y="104" fill="#ffb74d" font-size="14" font-family="'Consolas', monospace">reverse: Tree</text>
  <text x="470" y="104" fill="#666" font-size="12" font-family="'Consolas', monospace">// CAddr → Vec&lt;CAddr&gt; (dependents)</text>
  <text x="270" y="124" fill="#a5d6a7" font-size="14" font-family="'Consolas', monospace">db: Db</text>
  <text x="470" y="124" fill="#666" font-size="12" font-family="'Consolas', monospace">// sled database handle</text>

  <!-- Forward Edges section -->
  <text x="225" y="175" text-anchor="middle" fill="#81d4fa" font-size="16" font-weight="bold">Forward Edges</text>
  <text x="225" y="195" text-anchor="middle" fill="#607d8b" font-size="13">recipe → inputs</text>

  <!-- Forward: R node -->
  <circle cx="160" cy="270" r="28" fill="#232840" stroke="#81d4fa" stroke-width="2"/>
  <text x="160" y="276" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">R</text>

  <!-- Forward: S node -->
  <circle cx="290" cy="270" r="28" fill="#232840" stroke="#81d4fa" stroke-width="2"/>
  <text x="290" y="276" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">S</text>

  <!-- Forward: A node -->
  <circle cx="160" cy="400" r="28" fill="#232840" stroke="#64b5f6" stroke-width="2"/>
  <text x="160" y="406" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">A</text>

  <!-- Forward: B node -->
  <circle cx="290" cy="400" r="28" fill="#232840" stroke="#64b5f6" stroke-width="2"/>
  <text x="290" y="406" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">B</text>

  <!-- Forward arrows: R→A, R→B, S→A -->
  <line x1="148" y1="296" x2="148" y2="370" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="185" y1="293" x2="268" y2="377" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="275" y1="296" x2="180" y2="377" stroke="#64b5f6" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Forward labels -->
  <text x="225" y="450" text-anchor="middle" fill="#546e7a" font-size="12" font-family="'Consolas', monospace">R depends on A, B</text>
  <text x="225" y="468" text-anchor="middle" fill="#546e7a" font-size="12" font-family="'Consolas', monospace">S depends on A</text>

  <!-- Divider -->
  <line x1="450" y1="165" x2="450" y2="490" stroke="#3a3f5c" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Reverse Edges section -->
  <text x="675" y="175" text-anchor="middle" fill="#ffb74d" font-size="16" font-weight="bold">Reverse Edges</text>
  <text x="675" y="195" text-anchor="middle" fill="#607d8b" font-size="13">input → dependents</text>

  <!-- Reverse: A node -->
  <circle cx="610" cy="400" r="28" fill="#232840" stroke="#ffb74d" stroke-width="2"/>
  <text x="610" y="406" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">A</text>

  <!-- Reverse: B node -->
  <circle cx="740" cy="400" r="28" fill="#232840" stroke="#ffb74d" stroke-width="2"/>
  <text x="740" y="406" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">B</text>

  <!-- Reverse: R node -->
  <circle cx="610" cy="270" r="28" fill="#232840" stroke="#ffb74d" stroke-width="2"/>
  <text x="610" y="276" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">R</text>

  <!-- Reverse: S node -->
  <circle cx="740" cy="270" r="28" fill="#232840" stroke="#ffb74d" stroke-width="2"/>
  <text x="740" y="276" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">S</text>

  <!-- Reverse arrows: A→R, A→S, B→R -->
  <line x1="598" y1="374" x2="598" y2="300" stroke="#ffb74d" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="635" y1="377" x2="718" y2="296" stroke="#ffb74d" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <line x1="725" y1="374" x2="632" y2="296" stroke="#ffb74d" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Reverse labels -->
  <text x="675" y="450" text-anchor="middle" fill="#546e7a" font-size="12" font-family="'Consolas', monospace">A is used by R, S</text>
  <text x="675" y="468" text-anchor="middle" fill="#546e7a" font-size="12" font-family="'Consolas', monospace">B is used by R</text>

  <!-- Legend -->
  <rect x="310" y="490" width="280" height="24" rx="4" fill="#232840"/>
  <text x="450" y="507" text-anchor="middle" fill="#546e7a" font-size="11">Bidirectional edges enable invalidation, GC, and parallel materialization</text>
</svg>
